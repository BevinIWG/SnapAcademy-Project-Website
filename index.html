<!doctype html>
<html>
  <head>
    <title>Video Game Sales | Home</title>
    <meta name="description" content="A Catalog of Video Game Sales from 2006 to 2016" />
    <link rel="stylesheet" href="style.css" />
    <script type="text/javascript" src="scripts.js"></script>
  </head>

  <body>
    <header class="main-header">
      <h1 class="title">Video Game Sales</h1>
    </header>
    <div id="featured"> Top 3 Games</div>
    <div id="card-container"></div>
    <div class="card" style="display: none">
      <div class="card-content">
        <h2>TV Show Title</h2>
        <img src="" alt="TV Show Poster" />
      </div>
    </div>
    <div id="sorting">
      <button onclick="sortBy('total'),renderTable(),showCards('Total Sales')">Total Sales</button>
      <button onclick="sortBy('na'),renderTable(),showCards('North American Sales')">North America Sales</button>
      <button onclick="sortBy('jp'),renderTable(),showCards('Japan Sales')">Japan Sales</button>
      <button onclick="sortBy('pal'),renderTable(),showCards('Europe & Africa Sales')">Europe & Africa (PAL) Sales</button>
      <button onclick="sortBy('other'),renderTable(),showCards('Other Sales')">Other Sales</button>
    </div>
    <div id="filtering">
      <button onclick="filterBy('platform','PS4'),renderTable(),showCards('PS4')">PS4</button>
      <button onclick="filterBy('platform','PS3'),renderTable(),showCards('PS3')">PS3 </button>
      <button onclick="filterBy('platform','PS2'),renderTable(),showCards('PS2')">PS2 </button>
      <button onclick="filterBy('platform','PS'),renderTable(),showCards('PS')">PS </button>
      <button onclick="filterBy('platform','X360'),renderTable(),showCards('X360')">X360 </button>
      <button onclick="filterBy('platform','XOne'),renderTable(),showCards('XOne')">XOne </button>
      <button onclick="filterBy('platform','PC'),renderTable(),showCards('PC')">PC </button>
    </div>
    <div id="myTable"></div>
    <div class="footer">
      <p>Small portion of the thousands of games available. Website created by Bevin Greer</p>
    </div>
  </body>
</html>
